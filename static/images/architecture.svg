<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="renderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a52d5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="llamaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="workflowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44b3ab;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95afc0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f8fa6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#fafafa"/>
  
  <!-- Legend -->
  <g transform="translate(40, 30)">
    <rect x="0" y="0" width="16" height="16" rx="3" fill="url(#renderGrad)"/>
    <text x="24" y="13" font-size="13" fill="#333" font-weight="500">Render</text>
    <rect x="100" y="0" width="16" height="16" rx="3" fill="url(#llamaGrad)"/>
    <text x="124" y="13" font-size="13" fill="#333" font-weight="500">LlamaIndex</text>
  </g>
  
  <!-- Browser -->
  <g transform="translate(40, 120)" filter="url(#shadow)">
    <rect width="140" height="180" rx="12" fill="white" stroke="#e0e0e0" stroke-width="2"/>
    <rect width="140" height="32" rx="12" fill="#f5f5f5"/>
    <circle cx="20" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="38" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="56" cy="16" r="5" fill="#27ca40"/>
    <text x="70" y="100" text-anchor="middle" font-size="15" fill="#333" font-weight="600">Browser</text>
    <text x="70" y="125" text-anchor="middle" font-size="11" fill="#888">Upload &amp; View</text>
  </g>
  
  <!-- Arrow: Browser to API -->
  <g>
    <path d="M 190 200 L 260 200" stroke="#ccc" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="225" y="190" text-anchor="middle" font-size="10" fill="#888">HTTP</text>
  </g>
  
  <!-- Render Web Service -->
  <g transform="translate(270, 100)" filter="url(#shadow)">
    <rect width="180" height="220" rx="12" fill="white" stroke="url(#renderGrad)" stroke-width="3"/>
    <rect width="180" height="40" rx="12" fill="url(#renderGrad)"/>
    <text x="90" y="26" text-anchor="middle" font-size="13" fill="white" font-weight="600">Render Web Service</text>
    
    <g transform="translate(20, 55)">
      <rect width="140" height="35" rx="6" fill="#f8f8ff" stroke="#6c63ff" stroke-width="1"/>
      <text x="70" y="22" text-anchor="middle" font-size="12" fill="#6c63ff" font-weight="500">Express API</text>
    </g>
    <g transform="translate(20, 100)">
      <rect width="140" height="35" rx="6" fill="#f8f8ff" stroke="#6c63ff" stroke-width="1"/>
      <text x="70" y="22" text-anchor="middle" font-size="12" fill="#6c63ff" font-weight="500">SSE Stream</text>
    </g>
    <g transform="translate(20, 145)">
      <rect width="140" height="35" rx="6" fill="#f8f8ff" stroke="#6c63ff" stroke-width="1"/>
      <text x="70" y="22" text-anchor="middle" font-size="12" fill="#6c63ff" font-weight="500">Orchestrator</text>
    </g>
  </g>
  
  <!-- Arrow: Web Service to Workflows -->
  <g>
    <path d="M 460 200 L 530 200" stroke="#ccc" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="495" y="190" text-anchor="middle" font-size="10" fill="#888">dispatch</text>
  </g>
  
  <!-- Render Workflows -->
  <g transform="translate(540, 80)" filter="url(#shadow)">
    <rect width="200" height="280" rx="12" fill="white" stroke="url(#workflowGrad)" stroke-width="3"/>
    <rect width="200" height="40" rx="12" fill="url(#workflowGrad)"/>
    <text x="100" y="26" text-anchor="middle" font-size="13" fill="white" font-weight="600">Render Workflows</text>
    
    <g transform="translate(15, 55)">
      <rect width="170" height="32" rx="6" fill="#e8faf8" stroke="#4ecdc4" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#3d9d95" font-weight="500">upload_to_llamacloud</text>
    </g>
    <g transform="translate(15, 95)">
      <rect width="170" height="32" rx="6" fill="#e8faf8" stroke="#4ecdc4" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#3d9d95" font-weight="500">classify_document</text>
    </g>
    <g transform="translate(15, 135)">
      <rect width="170" height="32" rx="6" fill="#e8faf8" stroke="#4ecdc4" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#3d9d95" font-weight="500">parse_document</text>
    </g>
    <g transform="translate(15, 175)">
      <rect width="170" height="32" rx="6" fill="#e8faf8" stroke="#4ecdc4" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#3d9d95" font-weight="500">extract_fields</text>
    </g>
    <g transform="translate(15, 215)">
      <rect width="170" height="32" rx="6" fill="#e8faf8" stroke="#4ecdc4" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#3d9d95" font-weight="500">store_results</text>
    </g>
  </g>
  
  <!-- Arrow: Workflows to LlamaCloud -->
  <g>
    <path d="M 750 200 L 820 200" stroke="#ccc" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="785" y="190" text-anchor="middle" font-size="10" fill="#888">API calls</text>
  </g>
  
  <!-- LlamaCloud -->
  <g transform="translate(830, 80)" filter="url(#shadow)">
    <rect width="200" height="280" rx="12" fill="white" stroke="url(#llamaGrad)" stroke-width="3"/>
    <rect width="200" height="40" rx="12" fill="url(#llamaGrad)"/>
    <text x="100" y="26" text-anchor="middle" font-size="13" fill="white" font-weight="600">LlamaCloud</text>
    
    <g transform="translate(15, 55)">
      <rect width="170" height="32" rx="6" fill="#fff0f0" stroke="#ff6b6b" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#d94848" font-weight="500">Files API</text>
    </g>
    <g transform="translate(15, 95)">
      <rect width="170" height="32" rx="6" fill="#fff0f0" stroke="#ff6b6b" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#d94848" font-weight="500">Classify API</text>
    </g>
    <g transform="translate(15, 135)">
      <rect width="170" height="32" rx="6" fill="#fff0f0" stroke="#ff6b6b" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#d94848" font-weight="500">LlamaParse</text>
    </g>
    <g transform="translate(15, 175)">
      <rect width="170" height="32" rx="6" fill="#fff0f0" stroke="#ff6b6b" stroke-width="1"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#d94848" font-weight="500">LlamaExtract</text>
    </g>
    <g transform="translate(15, 215)">
      <rect width="170" height="32" rx="6" fill="#fff0f0" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="85" y="21" text-anchor="middle" font-size="11" fill="#d94848" font-weight="500">Pipeline (optional)</text>
    </g>
  </g>
  
  <!-- Database -->
  <g transform="translate(1050, 160)" filter="url(#shadow)">
    <ellipse cx="55" cy="15" rx="55" ry="15" fill="url(#dbGrad)"/>
    <rect x="0" y="15" width="110" height="70" fill="url(#dbGrad)"/>
    <ellipse cx="55" cy="85" rx="55" ry="15" fill="#7f8fa6"/>
    <ellipse cx="55" cy="15" rx="55" ry="15" fill="none" stroke="#6b7a8a" stroke-width="1"/>
    <text x="55" y="55" text-anchor="middle" font-size="12" fill="white" font-weight="600">Postgres</text>
    <text x="55" y="72" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Sessions + Docs</text>
  </g>
  
  <!-- Arrow: Workflows to DB -->
  <g>
    <path d="M 690 360 Q 690 420 900 420 Q 1050 420 1050 300" stroke="#ccc" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="870" y="435" text-anchor="middle" font-size="10" fill="#888">store</text>
  </g>
  
  <!-- Arrow: Web Service to DB -->
  <g>
    <path d="M 360 320 Q 360 500 700 500 Q 1050 500 1050 300" stroke="#ccc" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead)"/>
    <text x="700" y="515" text-anchor="middle" font-size="10" fill="#888">sessions</text>
  </g>
  
  <!-- Arrow: SSE back to Browser -->
  <g>
    <path d="M 270 250 Q 220 250 220 280 Q 220 350 130 350 Q 80 350 80 300" stroke="#6c63ff" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowheadPurple)"/>
    <text x="150" y="365" text-anchor="middle" font-size="10" fill="#6c63ff">SSE events</text>
  </g>
  
  <!-- Arrowhead definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ccc"/>
    </marker>
    <marker id="arrowheadPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c63ff"/>
    </marker>
  </defs>
  
  <!-- Flow numbers -->
  <g font-size="11" font-weight="bold">
    <circle cx="225" cy="210" r="12" fill="#333"/>
    <text x="225" y="214" text-anchor="middle" fill="white">1</text>
    
    <circle cx="495" cy="210" r="12" fill="#333"/>
    <text x="495" y="214" text-anchor="middle" fill="white">2</text>
    
    <circle cx="785" cy="210" r="12" fill="#333"/>
    <text x="785" y="214" text-anchor="middle" fill="white">3</text>
    
    <circle cx="1000" cy="420" r="12" fill="#333"/>
    <text x="1000" y="424" text-anchor="middle" fill="white">4</text>
    
    <circle cx="150" cy="340" r="12" fill="#6c63ff"/>
    <text x="150" y="344" text-anchor="middle" fill="white">5</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="575" text-anchor="middle" font-size="12" fill="#888">
    1. Upload ’ 2. Dispatch tasks ’ 3. Call LlamaCloud APIs ’ 4. Store results ’ 5. Stream progress to browser
  </text>
</svg>
