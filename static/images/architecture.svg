<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4A90D9"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1100" height="650" fill="#FDF6E3"/>
  
  <!-- Legend -->
  <g transform="translate(30, 25)">
    <!-- Render logo (simplified key shape) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#1A1A1A"/>
      <text x="9" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">R</text>
    </g>
    <text x="24" y="14" font-family="Arial, sans-serif" font-size="13" fill="#C41E3A" font-weight="600">Render</text>
    
    <!-- LlamaIndex logo (simplified llama) -->
    <g transform="translate(90, 0)">
      <rect x="0" y="0" width="18" height="18" rx="3" fill="#7C3AED"/>
      <text x="9" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">??</text>
    </g>
    <text x="114" y="14" font-family="Arial, sans-serif" font-size="13" fill="#C41E3A" font-weight="600">LlamaIndex</text>
  </g>
  
  <!-- ==================== BROWSER ==================== -->
  <g transform="translate(30, 180)">
    <rect width="120" height="160" rx="8" fill="#E8E8E8" stroke="#CCCCCC" stroke-width="2"/>
    <!-- Browser chrome -->
    <rect width="120" height="25" rx="8" fill="#D0D0D0"/>
    <circle cx="18" cy="12" r="5" fill="#FF5F56"/>
    <circle cx="34" cy="12" r="5" fill="#FFBD2E"/>
    <circle cx="50" cy="12" r="5" fill="#27CA40"/>
    <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C41E3A" font-weight="600">Browser</text>
  </g>
  
  <!-- ==================== RENDER WEB SERVICE ==================== -->
  <g transform="translate(200, 100)">
    <!-- Container -->
    <rect width="180" height="300" rx="8" fill="#D4A017" stroke="#B8860B" stroke-width="2"/>
    
    <!-- Render logo badge -->
    <g transform="translate(10, 10)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#1A1A1A"/>
      <text x="11" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">R</text>
    </g>
    
    <!-- Title -->
    <text x="90" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1A1A1A" font-weight="600">Render Web Service</text>
    
    <!-- Express API -->
    <g transform="translate(20, 50)">
      <rect width="140" height="40" rx="4" fill="#F4A460" stroke="#CD853F" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">Express API</text>
    </g>
    
    <!-- SSE Stream -->
    <g transform="translate(20, 120)">
      <rect width="140" height="40" rx="4" fill="#F4A460" stroke="#CD853F" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">SSE Stream</text>
    </g>
    
    <!-- Pipeline Orchestrator -->
    <g transform="translate(20, 190)">
      <rect width="140" height="50" rx="4" fill="#F4A460" stroke="#CD853F" stroke-width="1"/>
      <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">Pipeline</text>
      <text x="70" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">Orchestrator</text>
    </g>
    
    <!-- Internal arrows -->
    <path d="M 90 92 L 90 118" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="100" y="108" font-family="Arial, sans-serif" font-size="9" fill="#333">response</text>
    
    <path d="M 90 162 L 90 188" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="100" y="178" font-family="Arial, sans-serif" font-size="9" fill="#333">dispatch</text>
  </g>
  
  <!-- ==================== RENDER WORKFLOWS ==================== -->
  <g transform="translate(480, 70)">
    <!-- Container -->
    <rect width="180" height="340" rx="8" fill="#4A90D9" stroke="#3A7BC8" stroke-width="2"/>
    
    <!-- Render logo badge -->
    <g transform="translate(10, 10)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#1A1A1A"/>
      <text x="11" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">R</text>
    </g>
    
    <!-- Title -->
    <text x="90" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="600">Render Workflows</text>
    
    <!-- Upload task -->
    <g transform="translate(20, 50)">
      <rect width="140" height="40" rx="4" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B4513" font-style="italic">Upload</text>
    </g>
    
    <!-- Classify task -->
    <g transform="translate(20, 105)">
      <rect width="140" height="40" rx="4" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B4513" font-style="italic">Classify</text>
    </g>
    
    <!-- Parse task -->
    <g transform="translate(20, 160)">
      <rect width="140" height="40" rx="4" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B4513" font-style="italic">Parse</text>
    </g>
    
    <!-- Extract task -->
    <g transform="translate(20, 215)">
      <rect width="140" height="40" rx="4" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B4513" font-style="italic">Extract</text>
    </g>
    
    <!-- Store task -->
    <g transform="translate(20, 270)">
      <rect width="140" height="40" rx="4" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B4513" font-style="italic">Store</text>
    </g>
    
    <!-- Internal arrows between tasks -->
    <path d="M 90 92 L 90 103" stroke="#333" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M 90 147 L 90 158" stroke="#333" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M 90 202 L 90 213" stroke="#333" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M 90 257 L 90 268" stroke="#333" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  </g>
  
  <!-- ==================== LLAMACLOUD ==================== -->
  <g transform="translate(760, 70)">
    <!-- Container -->
    <rect width="180" height="340" rx="8" fill="#DDA0DD" stroke="#BA55D3" stroke-width="2"/>
    
    <!-- LlamaIndex logo badge -->
    <g transform="translate(10, 10)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#7C3AED"/>
      <text x="11" y="16" text-anchor="middle" font-size="12">??</text>
    </g>
    
    <!-- Title -->
    <text x="90" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4B0082" font-weight="600">LlamaCloud</text>
    
    <!-- Files API -->
    <g transform="translate(20, 50)">
      <rect width="140" height="40" rx="4" fill="#E6E6FA" stroke="#9370DB" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">Files API</text>
    </g>
    
    <!-- Classify API -->
    <g transform="translate(20, 105)">
      <rect width="140" height="40" rx="4" fill="#E6E6FA" stroke="#9370DB" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">Classify API</text>
    </g>
    
    <!-- LlamaParse -->
    <g transform="translate(20, 160)">
      <rect width="140" height="40" rx="4" fill="#E6E6FA" stroke="#9370DB" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">LlamaParse</text>
    </g>
    
    <!-- LlamaExtract -->
    <g transform="translate(20, 215)">
      <rect width="140" height="40" rx="4" fill="#E6E6FA" stroke="#9370DB" stroke-width="1"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B0000" font-style="italic">LlamaExtract</text>
    </g>
    
    <!-- Pipeline Retrieval (optional) -->
    <g transform="translate(20, 270)">
      <rect width="140" height="40" rx="4" fill="#E6E6FA" stroke="#9370DB" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="70" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B0000" font-style="italic">Pipeline</text>
      <text x="70" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B0000" font-style="italic">Retrieval</text>
    </g>
  </g>
  
  <!-- ==================== DATABASE ==================== -->
  <g transform="translate(480, 480)">
    <!-- Render logo badge -->
    <g transform="translate(70, -5)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#1A1A1A"/>
      <text x="11" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">R</text>
    </g>
    
    <!-- Database cylinder -->
    <ellipse cx="90" cy="40" rx="70" ry="20" fill="#87CEEB" stroke="#4682B4" stroke-width="2"/>
    <rect x="20" y="40" width="140" height="60" fill="#87CEEB" stroke="none"/>
    <ellipse cx="90" cy="100" rx="70" ry="20" fill="#5F9EA0" stroke="#4682B4" stroke-width="2"/>
    <line x1="20" y1="40" x2="20" y2="100" stroke="#4682B4" stroke-width="2"/>
    <line x1="160" y1="40" x2="160" y2="100" stroke="#4682B4" stroke-width="2"/>
    
    <text x="90" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8B0000" font-style="italic">Database</text>
    <text x="90" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">(Postgres)</text>
  </g>
  
  <!-- ==================== CONNECTING ARROWS ==================== -->
  
  <!-- Browser to Express API -->
  <path d="M 150 260 L 198 260 L 198 170 L 218 170" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="175" y="250" font-family="Arial, sans-serif" font-size="10" fill="#333">HTTP</text>
  
  <!-- SSE Stream back to Browser -->
  <path d="M 218 240 L 170 240 L 170 300 L 150 300" stroke="#4A90D9" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="165" y="320" font-family="Arial, sans-serif" font-size="10" fill="#4A90D9">SSE events</text>
  
  <!-- Orchestrator to Render Workflows -->
  <path d="M 380 315 L 430 315 L 430 240 L 478 240" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="405" y="270" font-family="Arial, sans-serif" font-size="10" fill="#333">start tasks</text>
  <text x="405" y="282" font-family="Arial, sans-serif" font-size="10" fill="#333">via Render API</text>
  
  <!-- Workflow tasks to LlamaCloud APIs (horizontal arrows) -->
  <path d="M 660 140 L 778 140" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 660 195 L 778 195" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 660 250 L 778 250" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 660 305 L 778 305" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 660 360 L 778 360" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  
  <!-- API calls label -->
  <text x="720" y="130" font-family="Arial, sans-serif" font-size="9" fill="#333">API calls</text>
  
  <!-- Store task to Database -->
  <path d="M 570 412 L 570 478" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="578" y="450" font-family="Arial, sans-serif" font-size="10" fill="#333">save results</text>
  
  <!-- Orchestrator polls Database for results -->
  <path d="M 290 402 L 290 530 L 478 530" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="320" y="545" font-family="Arial, sans-serif" font-size="10" fill="#333">read results</text>
  
  <!-- Express API creates document record -->
  <path d="M 340 152 L 340 530 L 478 530" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="348" y="350" font-family="Arial, sans-serif" font-size="9" fill="#333" writing-mode="tb">create doc record</text>
  
  <!-- Legend for flow -->
  <g transform="translate(30, 580)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="600">Flow:</text>
    <text x="40" y="0" font-family="Arial, sans-serif" font-size="11" fill="#666">1. Browser uploads ? 2. Express creates record, dispatches to Workflows ? 3. Tasks call LlamaCloud APIs ? 4. Results saved to Postgres ? 5. SSE streams to Browser</text>
  </g>
</svg>
