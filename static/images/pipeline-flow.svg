<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1480" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F16" />
      <stop offset="1" stop-color="#101827" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.34" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#94A3B8" />
    </marker>
    <style>
      .title { fill: #F8FAFC; font: 700 56px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .sub { fill: #93A6BC; font: 500 24px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .stepTitle { fill: #F8FAFC; font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; }
      .stepBody { fill: #D2DCE8; font: 500 19px 'Inter', 'Segoe UI', Arial, sans-serif; }
      .label { fill: #AFC1D6; font: 600 17px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .banner { fill: #F8FAFC; font: 700 28px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .bannerSub { fill: #D2DCE8; font: 500 20px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <text x="800" y="92" class="title">Document Intelligence Pipeline</text>
  <text x="800" y="126" class="sub">Current workflow sequence</text>

  <g filter="url(#shadow)">
    <rect x="100" y="186" width="1400" height="70" rx="20" fill="#101826" stroke="#334155" stroke-width="2.5" stroke-dasharray="10 10" />
    <text x="800" y="230" class="label">Real-time SSE progress streamed to the browser</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="314" width="250" height="230" rx="24" fill="#0D1520" stroke="#E5E7EB" stroke-width="3" />
    <text x="102" y="366" class="stepTitle">Upload</text>
    <text x="102" y="410" class="stepBody">Create document row</text>
    <text x="102" y="440" class="stepBody">and send bytes to</text>
    <text x="102" y="470" class="stepBody">LlamaCloud Files.</text>

    <rect x="360" y="314" width="250" height="230" rx="24" fill="#281809" stroke="#FB923C" stroke-width="3" />
    <text x="392" y="366" class="stepTitle">Classify</text>
    <text x="392" y="410" class="stepBody">Return doc type,</text>
    <text x="392" y="440" class="stepBody">confidence, and</text>
    <text x="392" y="470" class="stepBody">reasoning.</text>

    <rect x="650" y="314" width="250" height="230" rx="24" fill="#10223F" stroke="#60A5FA" stroke-width="3" />
    <text x="682" y="366" class="stepTitle">Parse</text>
    <text x="682" y="410" class="stepBody">Produce clean</text>
    <text x="682" y="440" class="stepBody">markdown and</text>
    <text x="682" y="470" class="stepBody">raw text.</text>

    <rect x="940" y="314" width="250" height="230" rx="24" fill="#0E2E2B" stroke="#2DD4BF" stroke-width="3" />
    <text x="972" y="366" class="stepTitle">Extract</text>
    <text x="972" y="410" class="stepBody">Apply a schema and</text>
    <text x="972" y="440" class="stepBody">pull structured</text>
    <text x="972" y="470" class="stepBody">fields.</text>

    <rect x="1230" y="314" width="250" height="230" rx="24" fill="#123442" stroke="#67E8F9" stroke-width="3" />
    <text x="1262" y="366" class="stepTitle">Store</text>
    <text x="1262" y="410" class="stepBody">Write to Postgres</text>
    <text x="1262" y="440" class="stepBody">and optionally</text>
    <text x="1262" y="470" class="stepBody">index pipeline text.</text>
  </g>

  <path d="M320 429H350" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M610 429H640" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M900 429H930" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)" />
  <path d="M1190 429H1220" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)" />

  <g filter="url(#shadow)">
    <rect x="70" y="640" width="1460" height="118" rx="22" fill="#241742" stroke="#A855F7" stroke-width="3" />
    <text x="800" y="698" class="banner">Render Workflows</text>
    <text x="800" y="734" class="bannerSub">Each stage runs as an isolated task with retries and timeout control</text>
  </g>
</svg>
