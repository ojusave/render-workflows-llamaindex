<svg xmlns="http://www.w3.org/2000/svg" width="1376" height="768" viewBox="0 0 1376 768" fill="none">
  <defs>
    <linearGradient id="bg" x1="180" y1="40" x2="1196" y2="728" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120" />
      <stop offset="1" stop-color="#090D14" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.24" />
    </filter>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#C084FC" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#60A5FA" />
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#FBBF24" />
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#22D3EE" />
    </marker>
    <style>
      .title { fill: #F8FAFC; font: 700 44px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #AFC1D6; font: 500 20px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .eyebrow { fill: #93A6BC; font: 600 16px 'Inter', 'Segoe UI', Arial, sans-serif; letter-spacing: 0.12em; text-transform: uppercase; text-anchor: middle; }
      .cardTitle { fill: #F8FAFC; font: 700 28px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .body { fill: #D8E1EC; font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .heroTitle { fill: #F8FAFC; font: 700 38px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .heroBody { fill: #DDD6FE; font: 500 20px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
      .label { fill: #D8E1EC; font: 600 16px 'Inter', 'Segoe UI', Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1376" height="768" fill="url(#bg)" />

  <text x="688" y="84" class="title">Document Intelligence Pipeline</text>
  <text x="688" y="116" class="subtitle">Render Workflows orchestrates the heavy document processing path</text>

  <text x="214" y="194" class="eyebrow">Client</text>
  <g filter="url(#shadow)">
    <rect x="94" y="220" width="240" height="176" rx="20" fill="#1B1230" stroke="#C084FC" stroke-width="3" />
    <text x="214" y="280" class="cardTitle">Browser</text>
    <text x="214" y="320" class="body">upload files</text>
    <text x="214" y="350" class="body">search and ask</text>
  </g>

  <text x="688" y="176" class="eyebrow">Render</text>
  <g filter="url(#shadow)">
    <rect x="458" y="208" width="460" height="84" rx="18" fill="#1D3B63" stroke="#60A5FA" stroke-width="3" />
    <text x="688" y="261" class="cardTitle">Express Web Service</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="388" y="332" width="600" height="204" rx="22" fill="#302055" stroke="#A78BFA" stroke-width="3" />
    <text x="688" y="404" class="heroTitle">Render Workflows</text>
    <text x="688" y="446" class="heroBody">upload -> classify -> parse -> extract -> store</text>
    <text x="688" y="478" class="heroBody">separate tasks with retries, polling, and status events</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="548" y="584" width="280" height="72" rx="36" fill="#10333F" stroke="#22D3EE" stroke-width="3" />
    <text x="688" y="629" class="cardTitle">Postgres</text>
  </g>

  <text x="1162" y="194" class="eyebrow">LlamaIndex / LlamaCloud</text>
  <g filter="url(#shadow)">
    <rect x="1054" y="246" width="216" height="118" rx="18" fill="#271F0E" stroke="#FBBF24" stroke-width="3" />
    <text x="1162" y="298" class="cardTitle">Document APIs</text>
    <text x="1162" y="332" class="body">files, classify,</text>
    <text x="1162" y="358" class="body">parse, extract</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1054" y="430" width="216" height="118" rx="18" fill="#271F0E" stroke="#FBBF24" stroke-width="3" />
    <text x="1162" y="482" class="cardTitle">Optional Pipeline</text>
    <text x="1162" y="516" class="body">index parsed text</text>
    <text x="1162" y="542" class="body">retrieve for search / ask</text>
  </g>

  <path d="M334 250H458" stroke="#C084FC" stroke-width="4" marker-end="url(#arrowPurple)" />
  <text x="396" y="228" class="label">upload / search / ask</text>

  <path d="M458 276H334" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrowBlue)" />
  <text x="396" y="302" class="label">SSE</text>

  <path d="M688 292V332" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrowBlue)" />
  <text x="770" y="318" class="label">dispatch + poll</text>

  <path d="M988 390H1054" stroke="#FBBF24" stroke-width="4" marker-end="url(#arrowGold)" />
  <text x="1020" y="368" class="label">task stages</text>

  <path d="M688 536V584" stroke="#22D3EE" stroke-width="4" marker-end="url(#arrowTeal)" />
  <text x="760" y="564" class="label">store rows</text>

  <path d="M988 480H1054" stroke="#22D3EE" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowTeal)" />
  <text x="1020" y="458" class="label">optional index</text>

  <path d="M918 250H1018V464H1054" stroke="#60A5FA" stroke-width="4" stroke-dasharray="10 8" fill="none" marker-end="url(#arrowBlue)" />
  <text x="1018" y="228" class="label">search / ask</text>
</svg>
